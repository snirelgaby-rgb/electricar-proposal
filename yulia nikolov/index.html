
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <title>הצעה עבור יוליה ניקולוב</title>

        .price { font-size: 32px; color: #c9a84c; font-weight: bold; margin-top: 20px; }

    </style>
</head>
<body>
    <div class="card">
        <h1>הצעת מחיר עבור יוליה ניקולוב</h1>

        <div class="price">5900 ₪ + מע"מ</div>
        <div class="footer">תודה שבחרת בנו!</div>
    </div>
</body>
</html>
